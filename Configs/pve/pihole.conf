# Parâmetros de Recursos e Rede do Container LXC Pi-hole
# Caminho original no Proxmox Host: /etc/pve/lxc/pihole.conf

arch: amd64
cores: 1
hostname: Pi-Hole
memory: 512
swap: 512
ostype: debian
unprivileged: 1

# Configuração de IP Estático vinculado à interface de rede local (veth)
net0: name=eth0,bridge=vmbr0,firewall=1,gw=192.168.X.X,ip=192.168.X.X/24,type=veth