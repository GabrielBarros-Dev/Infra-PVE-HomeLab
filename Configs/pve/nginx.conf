# ==============================================================================
# 📂 Arquivo: nginx.conf
# 🏛️ Homelab: Configuração de Otimização de Recursos e Rede do Proxy Reverso
# ==============================================================================

# Define o usuário que rodará os processos do Nginx
user nginx;

# Ajusta automaticamente o número de worker processes baseado nos cores de CPU disponíveis no CT
worker_processes auto;

# Caminho dos logs de erro do sistema
error_log /var/log/nginx/error.log notice;
pid       /var/run/nginx.pid;

events {
    # [Otimização de Recursos] Limite de conexões simultâneas por processo worker.
    # Essencial para suportar picos de requisições sem estourar a memória RAM do LXC.
    worker_connections 1024;
    
    # Permite que o worker aceite múltiplas conexões de uma vez na fila de rede
    multi_accept on;
}

http {
    # Mapeamento de tipos de arquivos suportados
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Formatadores de log de acessos personalizados e limpos
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # [Performance de Rede] Otimiza o envio de arquivos estáticos diretamente pelo Kernel
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    # Tempo limite para manter a conexão TCP aberta com o cliente (evita desperdício de sockets)
    keepalive_timeout  65;

    # [Otimização para Nuvem Privada / Nextcloud]
    # Define o tamanho máximo de upload permitido pelo proxy (essencial para sincronizar arquivos grandes e fotos)
    client_max_body_size 10G;

    # [Gerenciamento de Buffers de Rede] 
    # Evita que requisições ou downloads pesados criem arquivos temporários em disco, forçando o uso inteligente da memória
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;

    # Oculta a versão do Nginx nos cabeçalhos de erro por motivos de segurança (Hardening)
    server_tokens off;

    # Configuração de Compressão Gzip (Reduz o consumo de banda de rede do servidor)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Inclui automaticamente as regras e os subdomínios gerenciados pelo painel web do NPM
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/proxy_host/*.conf;
}