# Parâmetros de Recursos e Liberação de Kernel do Container LXC Nextcloud
# Caminho original no Proxmox Host: /etc/pve/lxc/nextcloud.conf

arch: amd64
cores: 2
hostname: NextCloud
memory: 2048
swap: 1024
ostype: debian
unprivileged: 1

# Modificações de Kernel necessárias para o funcionamento da Mesh VPN (Tailscale)
# Estas linhas permitem que o contêiner crie e manipule o driver de rede TUN/TAP virtual
lxc.cgroup2.devices.allow: c 10:200 rwm
lxc.mount.entry: /dev/net/tun dev/net/tun none bind,create=file