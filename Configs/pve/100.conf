# Parâmetros de Recursos e Rede do Container LXC 100 (Pi-hole)
# Caminho original no Proxmox Host: /etc/pve/lxc/100.conf

arch: amd64
cores: 1
hostname: Pi-Hole
memory: 512
swap: 512
ostype: debian
unprivileged: 1

# Configuração de IP Estático vinculado à interface de rede local (veth)
net0: name=eth0,bridge=vmbr0,firewall=1,gw=192.168.1.1,ip=192.168.1.10/24,type=veth